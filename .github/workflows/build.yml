name: Build and Deploy (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Set up Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Install Node dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Install Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Test public site and Functions
        run: npm test

      - name: Test Storage rules
        run: npx firebase-tools@latest emulators:exec --project pluto-storage-rules-test --only firestore,storage "npm run test:storage"

      - name: Analyze Flutter project
        run: flutter analyze .

      - name: Test Flutter project
        run: flutter test

      - name: Build Flutter web under /app
        run: flutter build web --release --base-href /app/

      - name: Remove unused local CanvasKit artifacts
        run: rm -rf build/web/canvaskit

      - name: Build public assets and deployment package
        run: npm run build:public

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLUTO_9B6CA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Configure Functions artifact cleanup
        run: npx firebase-tools@latest functions:artifacts:setpolicy --location us-central1 --days 7 --project pluto-9b6ca --force

      - name: Deploy site, Function, and rules
        run: npx firebase-tools@latest deploy --only firestore:rules,storage,functions:publicSite,hosting --project pluto-9b6ca --non-interactive
